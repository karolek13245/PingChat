<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ping</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f4f8;--surface:#fff;--border:#e8e8f0;--accent:#7c5cfc;--accent2:#f97aff;--accent-soft:rgba(124,92,252,.10);--text:#1a1a2e;--muted:#9898b3;--danger:#ff5c5c;--grad:linear-gradient(135deg,#7c5cfc,#f97aff);--bubble-me:linear-gradient(135deg,#7c5cfc,#f97aff);--bubble-them:#fff;--bubble-border:#e8e8f0;--nav-h:72px;--radius:18px}
[data-theme=dark]{--bg:#0f0f13;--surface:#1a1a22;--border:#2a2a3a;--text:#f0efff;--muted:#6b6b8a;--accent-soft:rgba(124,92,252,.15);--bubble-them:#22222e;--bubble-border:#2a2a3a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background .3s,color .3s}
input,textarea,button,select{font-family:inherit}

/* PAGES */
.page{position:fixed;inset:0;display:none;flex-direction:column;background:var(--bg);z-index:10}
.page.active{display:flex}
#pg-auth.active{display:flex!important;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
#pg-app{flex-direction:row}
#pg-app.active{display:flex!important}

/* LOGO */
.ping-logo{display:flex;align-items:center;gap:10px}
.ping-logo-icon{width:36px;height:36px;background:var(--grad);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(124,92,252,.3)}
.ping-logo-icon svg{width:20px;height:20px}
.ping-logo-text{font-size:22px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* AUTH */
.auth-tagline{font-size:13px;color:var(--muted);margin-bottom:24px;text-align:center}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(124,92,252,.08);margin-top:18px}
.auth-tabs{display:flex;background:var(--bg);border-radius:12px;padding:3px;gap:3px}
.auth-tab{flex:1;padding:9px;font-size:13px;font-weight:700;border:none;background:none;color:var(--muted);border-radius:9px;cursor:pointer;transition:background .2s,color .2s}
.auth-tab.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.a-input{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:15px;color:var(--text);outline:none;width:100%;transition:border-color .2s,box-shadow .2s}
.a-input::placeholder{color:var(--muted)}
.a-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.12)}
.a-btn{background:var(--grad);border:none;border-radius:12px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(124,92,252,.25);transition:opacity .2s,transform .1s}
.a-btn:active{opacity:.85;transform:scale(.98)}
.a-btn:disabled{opacity:.6;cursor:not-allowed}
.enc-badge{display:flex;align-items:center;gap:6px;justify-content:center;font-size:11px;color:var(--accent);font-weight:600;background:var(--accent-soft);padding:7px 14px;border-radius:50px}
.auth-err{font-size:12px;color:var(--danger);text-align:center;min-height:16px}
.remember-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer}
.remember-row input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}

/* SIDEBAR */
.sidebar{width:300px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0}
.sidebar-head{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.srch{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:9px 13px;display:flex;align-items:center;gap:8px;transition:border-color .2s;margin-top:12px}
.srch:focus-within{border-color:var(--accent)}
.srch input{background:none;border:none;outline:none;font-size:13px;color:var(--text);width:100%}
.srch input::placeholder{color:var(--muted)}
.sec-label{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:12px 16px 6px}
.d-contact-list{flex:1;overflow-y:auto}
.d-ci{display:flex;align-items:center;gap:11px;padding:11px 16px;cursor:pointer;transition:background .15s;position:relative}
.d-ci:hover{background:var(--bg)}
.d-ci.active{background:var(--accent-soft)}
.d-ci.active::before{content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:0 3px 3px 0;background:var(--grad)}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0;position:relative;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.online-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;border:2px solid var(--surface)}
.s-online{background:#22c55e}.s-offline{background:#9898b3}
.d-ci-name{font-size:13px;font-weight:600}
.d-ci-prev{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.d-ci-time{font-size:11px;color:var(--muted);flex-shrink:0}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.my-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0}
.my-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.my-name{font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:5px;border-radius:8px;font-size:16px;transition:color .2s}
.icon-btn:hover{color:var(--text)}

/* MAIN PANEL */
.main-panel{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.d-tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 14px;flex-shrink:0}
.d-tab{padding:12px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.d-tab.active{color:var(--accent);border-color:var(--accent)}
.d-panels{flex:1;overflow:hidden;position:relative}
.d-panel{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .2s}
.d-panel.active{opacity:1;pointer-events:all}

/* CHAT */
.chat-hd{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-shrink:0}
.chat-hd-name{font-size:15px;font-weight:700}
.chat-hd-status{font-size:11px;color:#22c55e;margin-top:1px}
.msgs-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:3px}
.enc-bar{display:flex;align-items:center;justify-content:center;gap:5px;padding:5px;font-size:11px;color:var(--accent);opacity:.7;flex-shrink:0}
.msg-grp{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.msg-grp.mine{align-items:flex-end}
.msg-grp.theirs{align-items:flex-start}
.msg-row{display:flex;align-items:flex-end;gap:7px}
.msg-grp.mine .msg-row{flex-direction:row-reverse}
.m-av{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.m-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.bubble{max-width:65vw;padding:9px 13px;font-size:14px;line-height:1.5;border-radius:16px;word-break:break-word}
.msg-grp.mine .bubble{background:var(--bubble-me);color:#fff;border-bottom-right-radius:4px}
.msg-grp.theirs .bubble{background:var(--bubble-them);border:1px solid var(--bubble-border);color:var(--text);border-bottom-left-radius:4px}
.msg-time{font-size:10px;color:var(--muted);padding:0 3px;opacity:0;transition:opacity .2s;white-space:nowrap}
.msg-row:hover .msg-time{opacity:1}
.typing-row{display:flex;align-items:center;gap:8px;padding:4px 16px;min-height:26px}
.typing-dots{display:flex;gap:3px;align-items:center}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:tdot 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:10px;text-align:center;padding:20px}
.empty-chat .ec-icon{font-size:48px}
.empty-chat h3{font-size:17px;color:var(--text);font-weight:700}
.chat-input-bar{padding:10px 14px 12px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-wrap{background:var(--bg);border:1.5px solid var(--border);border-radius:50px;display:flex;align-items:center;gap:6px;padding:7px 8px 7px 14px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent)}
.msg-inp{flex:1;background:none;border:none;outline:none;font-size:14px;color:var(--text);resize:none;max-height:90px;line-height:1.4}
.msg-inp::placeholder{color:var(--muted)}
.inp-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:5px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;transition:color .15s}
.inp-btn:hover{color:var(--accent)}
.send-btn{background:var(--grad);border:none;width:34px;height:34px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:transform .15s}
.send-btn:active{transform:scale(.9)}

/* ADD / SETTINGS */
.add-panel{flex:1;overflow-y:auto;padding:24px}
.add-card{background:var(--surface);border-radius:var(--radius);padding:22px;max-width:420px;display:flex;flex-direction:column;gap:13px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.add-card-title{font-size:19px;font-weight:800}
.f-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:-4px}
.f-input{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;font-size:14px;color:var(--text);outline:none;width:100%;transition:border-color .2s}
.f-input::placeholder{color:var(--muted)}
.f-input:focus{border-color:var(--accent)}
.submit-btn{background:var(--grad);border:none;border-radius:12px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
.submit-btn:active{opacity:.85}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.settings-panel{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:16px}
.s-section-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.prof-card{background:var(--surface);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.prof-av{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;overflow:hidden;cursor:pointer;position:relative}
.prof-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.av-edit-badge{position:absolute;bottom:0;right:0;width:20px;height:20px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;border:2px solid var(--surface)}
.edit-prof-btn{margin-top:8px;background:var(--accent-soft);border:none;border-radius:50px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--accent);cursor:pointer}
.s-group{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.s-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.s-row:last-child{border-bottom:none}
.s-row:hover{background:var(--bg)}
.s-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.s-lbl{flex:1;font-size:14px;font-weight:500}
.s-arr{color:var(--muted);font-size:18px}
.toggle{width:42px;height:24px;background:var(--border);border-radius:50px;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(18px)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:50px;font-size:10px;font-weight:800}
.badge-owner{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.badge-dev{background:linear-gradient(135deg,#7c5cfc,#06b6d4);color:#fff}
.badge-tester{background:linear-gradient(135deg,#22c55e,#06b6d4);color:#fff}
.badge-bug{background:linear-gradient(135deg,#ef4444,#f97aff);color:#fff}
.badge-early{background:linear-gradient(135deg,#f97aff,#f59e0b);color:#fff}
.badge-verified{background:linear-gradient(135deg,#06b6d4,#22c55e);color:#fff}
.badges-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}

/* MOBILE */
.mob-wrap{display:flex;flex-direction:column;height:100vh;width:100%;overflow:hidden;background:var(--bg)}
.m-screens{flex:1;position:relative;overflow:hidden}
.m-screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;will-change:transform}
.m-screen.active{transform:translateX(0);opacity:1;z-index:2;pointer-events:all}
.m-screen.left{transform:translateX(-100%);opacity:0;z-index:1;pointer-events:none}
.m-screen.right{transform:translateX(100%);opacity:0;z-index:1;pointer-events:none}
.m-top{background:var(--surface);padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.m-top-title{font-size:19px;font-weight:800;flex:1}
.m-search{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:50px;padding:8px 13px;display:flex;align-items:center;gap:8px;transition:border-color .2s}
.m-search:focus-within{border-color:var(--accent)}
.m-search input{background:none;border:none;outline:none;font-size:14px;color:var(--text);width:100%}
.m-search input::placeholder{color:var(--muted)}
.m-av-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;background:var(--grad);overflow:hidden}
.m-av-btn img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.m-ci{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.m-ci:active{background:var(--accent-soft)}
.m-ci-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0;position:relative;overflow:hidden}
.m-ci-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.m-ci-name{font-size:15px;font-weight:600}
.m-ci-prev{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-ci-time{font-size:11px;color:var(--muted);flex-shrink:0}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;gap:8px}
.empty-illo{width:100px;height:100px;background:var(--accent-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:12px;position:relative}
.bf{position:absolute;border-radius:50%;animation:floatB 3s ease-in-out infinite}
.b1{width:12px;height:12px;background:var(--grad);top:8px;right:10px;opacity:.7}
.b2{width:8px;height:8px;background:#f97aff;bottom:12px;left:8px;opacity:.5;animation-delay:.8s}
.b3{width:6px;height:6px;background:var(--accent);top:18px;left:6px;opacity:.4;animation-delay:1.5s}
@keyframes floatB{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.empty-title{font-size:18px;font-weight:700}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.6}
.add-link{color:var(--accent);font-weight:700;cursor:pointer}
.m-form-body{flex:1;padding:18px 14px;display:flex;flex-direction:column;gap:13px;overflow-y:auto}
.m-settings-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.m-prof-card{background:var(--surface);border-radius:var(--radius);padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:7px}
.swatches{display:flex;gap:9px;flex-wrap:wrap}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s}
.swatch.sel{border-color:var(--accent);transform:scale(1.12)}
.m-nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 8px 8px;flex-shrink:0}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;flex:1;padding:5px 0;border-radius:14px;transition:background .15s}
.nav-btn:active{background:var(--accent-soft)}
.nav-ico{width:44px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50px;transition:background .2s}
.nav-btn.active .nav-ico{background:var(--accent-soft)}
.nav-btn svg{width:21px;height:21px;fill:none}
.nav-btn:not(.active) svg{stroke:var(--muted)}
.nav-btn.active svg{stroke:var(--accent)}
.nav-lbl{font-size:10px;font-weight:600;color:var(--muted);transition:color .2s}
.nav-btn.active .nav-lbl{color:var(--accent)}
.nav-center .nav-ico{width:50px;height:50px;border-radius:50%;background:var(--grad);box-shadow:0 4px 16px rgba(124,92,252,.35);margin-top:-20px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.nav-center.active .nav-ico{transform:rotate(45deg)}
.nav-center svg{stroke:#fff !important}
.nav-center .nav-lbl{color:var(--accent);font-weight:700}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:6px 22px 34px;width:100%;max-width:500px;display:flex;flex-direction:column;gap:13px;max-height:90vh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.4,0,.2,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:4px;margin:10px auto 6px}
.modal-title{font-size:17px;font-weight:800}
.modal-close-btn{background:var(--bg);border:none;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;align-self:flex-end;margin-top:-6px}
.av-upload-area{border:2px dashed var(--border);border-radius:14px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color .2s;text-align:center}
.av-upload-area:hover{border-color:var(--accent)}
.av-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;display:none;border:3px solid var(--accent)}

/* REAL-TIME BADGE */
.realtime-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;fon
